<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AryanAI | Premium AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Disable Right Click */
        body {
            pointer-events: auto;
        }

        /* Premium Animated Background */
        .bg-glow {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,77,139,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(59,91,219,0.08) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Premium Particles */
        .particle {
            position: fixed;
            background: radial-gradient(circle, rgba(255,77,139,0.3) 0%, rgba(255,77,139,0) 80%);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 20s infinite ease-in-out;
            z-index: 0;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) translateX(-20px) scale(0); opacity: 0; }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-20vh) translateX(20px) scale(1); opacity: 0; }
        }

        /* Main App */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 2;
            background: rgba(0,0,0,0.3);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -380px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: rgba(8,8,12,0.98);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,77,139,0.15);
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 40px rgba(0,0,0,0.5);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header h3 {
            color: white;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .sidebar-header p {
            color: #5a5a7a;
            font-size: 12px;
            margin-top: 6px;
        }

        /* New Chat Button */
        .new-chat-btn {
            margin: 16px 24px;
            padding: 14px;
            background: linear-gradient(135deg, #ff4d8b, #ff6b9f);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .new-chat-btn:hover {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(255,77,139,0.3);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px 16px;
        }

        /* Session Card - Complete Chat Session */
        .session-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            transition: all 0.2s;
        }

        .session-card:hover {
            background: rgba(255,77,139,0.05);
            border-color: rgba(255,77,139,0.2);
        }

        .session-header {
            padding: 14px 16px;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .session-title {
            font-weight: 500;
            color: white;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .session-date {
            font-size: 10px;
            color: #5a5a7a;
            margin-left: 10px;
        }

        .session-preview {
            padding: 12px 16px;
            font-size: 12px;
            color: #8a8aaa;
            border-top: 1px solid rgba(255,255,255,0.03);
            display: none;
        }

        .session-card.expanded .session-preview {
            display: block;
        }

        .session-messages {
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.03);
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .session-card.expanded .session-messages {
            display: block;
        }

        .session-message {
            padding: 8px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .session-message:last-child {
            border-bottom: none;
        }

        .session-msg-user {
            color: #ff4d8b;
            font-weight: 500;
        }

        .session-msg-bot {
            color: #8a8aaa;
            margin-top: 4px;
            margin-left: 12px;
        }

        .delete-session {
            background: rgba(255,77,139,0.15);
            border: none;
            color: #ff4d8b;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-session:hover {
            background: rgba(255,77,139,0.3);
        }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .clear-history-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255,77,139,0.1);
            border: 1px solid rgba(255,77,139,0.2);
            border-radius: 40px;
            color: #ff4d8b;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-history-btn:hover {
            background: rgba(255,77,139,0.2);
            border-color: #ff4d8b;
        }

        /* Sidebar Overlay */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Main Chat */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-left: 0;
            transition: margin-left 0.3s;
        }

        /* Header */
        .chat-header {
            padding: 20px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .menu-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 22px;
            cursor: pointer;
            color: white;
            padding: 10px 14px;
            border-radius: 14px;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: rgba(255,77,139,0.15);
            border-color: rgba(255,77,139,0.3);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4d8b, #ff85b3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ff4d8b, #ff85b3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-badge {
            background: rgba(255,77,139,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255,77,139,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(5px);
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #ff4d8b, #ff85b3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 15px;
        }

        .user-name {
            color: white;
            font-weight: 500;
            font-size: 14px;
        }

        .reset-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 40px;
            color: #8a8aaa;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(255,77,139,0.15);
            color: #ff4d8b;
            border-color: rgba(255,77,139,0.3);
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 85%;
            animation: messageSlide 0.35s ease;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bot-message {
            align-self: flex-start;
        }

        .message-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            flex-shrink: 0;
            background: rgba(20,20,30,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .user-message .message-avatar {
            background: linear-gradient(135deg, #ff4d8b, #ff6b9f);
            border: none;
            content: "👤";
        }

        .bot-message .message-avatar {
            background: linear-gradient(135deg, #3b5bdb, #5b7beb);
            border: none;
        }

        .message-content {
            background: rgba(18,18,26,0.9);
            backdrop-filter: blur(10px);
            padding: 14px 22px;
            border-radius: 24px;
            color: #e8e8f0;
            font-size: 15px;
            line-height: 1.55;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .user-message .message-content {
            background: linear-gradient(135deg, #ff4d8b, #ff6b9f);
            border: none;
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 80px 20px;
        }

        .welcome-greeting {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ff4d8b, #ff85b3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        .welcome-sub {
            color: #6a6a8a;
            font-size: 17px;
        }

        /* Input Area */
        .input-area {
            padding: 20px 32px 28px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: rgba(18,18,26,0.9);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 6px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(255,77,139,0.5);
            box-shadow: 0 0 0 2px rgba(255,77,139,0.1);
        }

        .message-input {
            flex: 1;
            padding: 14px 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            resize: none;
        }

        .message-input:focus {
            outline: none;
        }

        .send-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #ff4d8b, #ff6b9f);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(255,77,139,0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Footer Note */
        .footer-note {
            text-align: center;
            padding: 12px 20px;
            font-size: 11px;
            color: #4a4a6a;
            border-top: 1px solid rgba(255,255,255,0.03);
            background: rgba(0,0,0,0.2);
        }

        /* Typing */
        .typing {
            display: flex;
            gap: 6px;
            padding: 12px 18px;
            background: rgba(18,18,26,0.9);
            border-radius: 24px;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #ff4d8b;
            border-radius: 50%;
            animation: typingAnim 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingAnim {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar, .history-list::-webkit-scrollbar, .session-messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track, .history-list::-webkit-scrollbar-track, .session-messages::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
        }
        .messages-area::-webkit-scrollbar-thumb, .history-list::-webkit-scrollbar-thumb, .session-messages::-webkit-scrollbar-thumb {
            background: #ff4d8b;
            border-radius: 4px;
        }

        @media (max-width: 700px) {
            .message { max-width: 95%; }
            .sidebar { width: 320px; }
            .chat-header { padding: 16px 20px; }
            .messages-area { padding: 20px; }
            .welcome-greeting { font-size: 28px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="bg-glow"></div>
    <div class="app" id="app"></div>

    <script>
        // Disable Right Click
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // ============ CONFIGURATION ============
        const API_KEY = "AIzaSyDvgCDic4EwWku6LnetWFiRtF1MxChjTGA";
        const MODEL_NAME = "gemini-2.5-flash";
        const USER_KEY = "aryanai_username";
        const SESSIONS_KEY = "aryanai_sessions";
        
        let USERNAME = localStorage.getItem(USER_KEY) || "";
        let isSending = false;
        let currentSession = [];
        let allSessions = [];
        let currentSessionId = null;

        // Load sessions
        function loadSessions() {
            const saved = localStorage.getItem(SESSIONS_KEY);
            if (saved) {
                allSessions = JSON.parse(saved);
            } else {
                allSessions = [];
            }
        }

        function saveSessions() {
            localStorage.setItem(SESSIONS_KEY, JSON.stringify(allSessions));
        }

        // Save current session
        function saveCurrentSession() {
            if (currentSession.length > 0 && currentSessionId) {
                const existingIndex = allSessions.findIndex(s => s.id === currentSessionId);
                const sessionData = {
                    id: currentSessionId,
                    title: currentSession[0]?.question?.substring(0, 50) || "New Chat",
                    date: new Date().toLocaleString(),
                    messages: [...currentSession],
                    preview: currentSession[0]?.question?.substring(0, 60) || "No messages"
                };
                
                if (existingIndex !== -1) {
                    allSessions[existingIndex] = sessionData;
                } else {
                    allSessions.unshift(sessionData);
                }
                saveSessions();
            }
        }

        // Create new session
        function newChat() {
            if (currentSession.length > 0) {
                saveCurrentSession();
            }
            currentSession = [];
            currentSessionId = Date.now();
            renderMessagesArea(true);
            renderHistoryList();
        }

        // Load a session
        function loadSession(session) {
            if (currentSession.length > 0) {
                saveCurrentSession();
            }
            currentSession = [...session.messages];
            currentSessionId = session.id;
            renderMessagesArea(false);
            renderHistoryList();
        }

        // Delete session
        function deleteSession(sessionId, event) {
            event.stopPropagation();
            allSessions = allSessions.filter(s => s.id !== sessionId);
            if (currentSessionId === sessionId) {
                newChat();
            }
            saveSessions();
            renderHistoryList();
        }

        // Clear all sessions
        function clearAllSessions() {
            if (confirm('Delete all chat history? This cannot be undone.')) {
                allSessions = [];
                newChat();
                saveSessions();
                renderHistoryList();
            }
        }

        // Create particles
        function createParticles() {
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 100 + 50;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = Math.random() * 20 + 15 + 's';
                document.body.appendChild(p);
            }
        }
        createParticles();

        // Render Username Modal
        function renderUsernameModal() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div style="position: fixed; top:0; left:0; width:100%; height:100%; background: #000000; backdrop-filter: blur(40px); display: flex; justify-content: center; align-items: center; z-index: 1000;">
                    <div style="background: rgba(10,10,18,0.95); backdrop-filter: blur(20px); border-radius: 48px; padding: 48px 40px; width: 90%; max-width: 440px; text-align: center; border: 1px solid rgba(255,77,139,0.2); box-shadow: 0 30px 60px rgba(0,0,0,0.5);">
                        <div style="font-size: 64px; margin-bottom: 20px;">✨</div>
                        <div style="font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #ff4d8b, #ff85b3); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 12px;">ARYANAI</div>
                        <div style="color: #6a6a8a; font-size: 14px; margin-bottom: 32px;">Premium AI Assistant • Created by ARYAN</div>
                        <input type="text" id="usernameInput" placeholder="Enter your name" style="width: 100%; padding: 16px 20px; background: rgba(30,30,45,0.8); border: 1px solid rgba(255,77,139,0.2); border-radius: 60px; color: white; font-size: 16px; margin-bottom: 20px;">
                        <button id="startBtn" style="width: 100%; padding: 16px; background: linear-gradient(135deg, #ff4d8b, #ff6b9f); border: none; border-radius: 60px; color: white; font-weight: 600; cursor: pointer;">✨ Enter ✨</button>
                    </div>
                </div>
            `;
            document.getElementById('startBtn').onclick = () => {
                const name = document.getElementById('usernameInput').value.trim();
                if (name) {
                    USERNAME = name;
                    localStorage.setItem(USER_KEY, USERNAME);
                    initApp();
                }
            };
        }

        function initApp() {
            loadSessions();
            if (allSessions.length === 0) {
                newChat();
            } else {
                currentSessionId = allSessions[0].id;
                currentSession = [...allSessions[0].messages];
            }
            renderMainApp();
        }

        // Render Messages Area
        function renderMessagesArea(isNewChat) {
            const messagesArea = document.getElementById('messagesArea');
            if (!messagesArea) return;
            
            messagesArea.innerHTML = '';
            
            if (currentSession.length === 0) {
                messagesArea.innerHTML = `
                    <div class="welcome-message">
                        <div class="welcome-greeting">Hi ${USERNAME}</div>
                        <div class="welcome-sub">Where should we start?</div>
                    </div>
                `;
                return;
            }
            
            currentSession.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role === 'user' ? 'user-message' : 'bot-message'}`;
                div.innerHTML = `
                    <div class="message-avatar">${msg.role === 'user' ? '👤' : '✨'}</div>
                    <div class="message-content">${msg.content.replace(/\n/g, '<br>')}</div>
                `;
                messagesArea.appendChild(div);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Render History List
        function renderHistoryList() {
            const container = document.getElementById('historyList');
            if (!container) return;
            
            if (allSessions.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #5a5a7a; padding: 40px;">No chats yet</div>';
                return;
            }
            
            container.innerHTML = allSessions.map(session => `
                <div class="session-card ${currentSessionId === session.id ? 'expanded' : ''}" data-id="${session.id}">
                    <div class="session-header">
                        <div class="session-title">${escapeHtml(session.title)}</div>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <span class="session-date">${session.date}</span>
                            <button class="delete-session" data-id="${session.id}">🗑️</button>
                        </div>
                    </div>
                    <div class="session-preview">${escapeHtml(session.preview)}</div>
                    <div class="session-messages">
                        ${session.messages.slice(0, 6).map(msg => `
                            <div class="session-message">
                                <div class="session-msg-user">${msg.role === 'user' ? '👤 ' + USERNAME : '✨ ARYANAI'}</div>
                                <div class="session-msg-bot">${escapeHtml(msg.content.substring(0, 80))}${msg.content.length > 80 ? '...' : ''}</div>
                            </div>
                        `).join('')}
                        ${session.messages.length > 6 ? '<div style="color:#5a5a7a; font-size:11px; padding:8px;">+' + (session.messages.length - 6) + ' more messages</div>' : ''}
                    </div>
                </div>
            `).join('');
            
            // Add click handlers
            document.querySelectorAll('.session-card').forEach(card => {
                card.onclick = (e) => {
                    if (e.target.classList.contains('delete-session')) return;
                    const id = parseInt(card.dataset.id);
                    const session = allSessions.find(s => s.id === id);
                    if (session) loadSession(session);
                };
            });
            
            document.querySelectorAll('.delete-session').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    deleteSession(id, e);
                };
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Render Main App
        function renderMainApp() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="sidebar-overlay" id="sidebarOverlay"></div>
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <h3>📜 Chat History</h3>
                        <p>Complete sessions saved locally</p>
                    </div>
                    <button class="new-chat-btn" id="newChatBtn">✨ New Chat</button>
                    <div class="history-list" id="historyList"></div>
                    <div class="sidebar-footer">
                        <button class="clear-history-btn" id="clearHistoryBtn">🗑️ Clear All History</button>
                    </div>
                </div>
                
                <div class="main-chat">
                    <div class="chat-header">
                        <button class="menu-btn" id="menuBtn">☰</button>
                        <div class="logo-area">
                            <div class="logo-icon">✨</div>
                            <div class="logo-text">ARYANAI</div>
                        </div>
                        <div class="user-info">
                            <div class="user-badge">
                                <div class="user-avatar">${USERNAME.charAt(0).toUpperCase()}</div>
                                <span class="user-name">${USERNAME}</span>
                            </div>
                            <button class="reset-btn" id="resetUserBtn">⟳ Switch</button>
                        </div>
                    </div>
                    
                    <div class="messages-area" id="messagesArea"></div>
                    
                    <div class="input-area">
                        <div class="input-wrapper">
                            <textarea class="message-input" id="messageInput" placeholder="Type your message..." rows="1"></textarea>
                            <button class="send-btn" id="sendBtn">Send ✨</button>
                        </div>
                    </div>
                    <div class="footer-note">
                        ⚡ AI can make mistakes. Please verify important information.
                    </div>
                </div>
            `;
            
            // Sidebar
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const menuBtn = document.getElementById('menuBtn');
            
            menuBtn.onclick = () => { sidebar.classList.add('open'); overlay.classList.add('active'); };
            overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); };
            
            document.getElementById('resetUserBtn').onclick = () => {
                localStorage.removeItem(USER_KEY);
                USERNAME = "";
                renderUsernameModal();
            };
            
            document.getElementById('newChatBtn').onclick = () => {
                newChat();
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            };
            
            document.getElementById('clearHistoryBtn').onclick = () => clearAllSessions();
            
            const messagesArea = document.getElementById('messagesArea');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            
            renderMessagesArea(false);
            renderHistoryList();
            
            function addMessage(role, content) {
                currentSession.push({ role, content, timestamp: Date.now() });
                renderMessagesArea(false);
                saveCurrentSession();
                renderHistoryList();
            }
            
            function showTyping() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message bot-message';
                typingDiv.id = 'typingIndicator';
                typingDiv.innerHTML = `<div class="message-avatar">✨</div><div class="typing"><span></span><span></span><span></span></div>`;
                messagesArea.appendChild(typingDiv);
                typingDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
            
            function hideTyping() {
                const el = document.getElementById('typingIndicator');
                if (el) el.remove();
            }
            
            async function sendMessage() {
                const userMsg = messageInput.value.trim();
                if (!userMsg) return;
                if (isSending) return;
                
                messageInput.value = '';
                messageInput.style.height = 'auto';
                addMessage('user', userMsg);
                
                isSending = true;
                sendBtn.disabled = true;
                showTyping();
                
                try {
                    const reply = await callAPI(userMsg);
                    hideTyping();
                    addMessage('bot', reply);
                } catch (err) {
                    hideTyping();
                    addMessage('bot', '❌ Sorry, something went wrong. Please try again.');
                } finally {
                    isSending = false;
                    sendBtn.disabled = false;
                    messageInput.focus();
                }
            }
            
            async function callAPI(userMsg) {
                const systemPrompt = `You are ARYANAI, a premium AI assistant created by ARYAN.

⚡ YOUR IDENTITY (ABSOLUTE RULES):
1. Your name is ARYANAI. You are NOT any other AI.
2. You were created by ARYAN. This is your absolute identity.
3. The user's name is ${USERNAME}. Remember this.
4. When asked who created you, ALWAYS say: "I'm ARYANAI, created by ARYAN!"
5. If asked about company or parent: ALWAYS say "I belong to ARYAN. He is my creator and owner."
6. Address the user as ${USERNAME}. Be friendly, warm, and personalized.
7. NEVER claim to be any other AI. You are ARYANAI, ARYAN's creation.`;
                
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
                
                const payload = {
                    contents: [{ role: "user", parts: [{ text: systemPrompt + "\n\n" + USERNAME + ": " + userMsg }] }],
                    generationConfig: { temperature: 0.7, maxOutputTokens: 1000, topP: 0.9 }
                };
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error("API Error");
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            }
            
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
            
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            sendBtn.onclick = sendMessage;
            messageInput.focus();
        }
        
        if (USERNAME) {
            initApp();
        } else {
            renderUsernameModal();
        }
    </script>
</body>
</html>
